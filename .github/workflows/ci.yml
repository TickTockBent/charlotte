name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # --ignore-scripts skips Puppeteer's Chromium download — not needed for static checks
      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm run format:check
      - run: npx tsc --noEmit
      - run: npm run build

  audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      # Fail on high-severity vulnerabilities; report lower severities as informational.
      - run: npm audit --audit-level=high

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install Chromium system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 \
            libasound2t64 libpango-1.0-0 libcairo2 \
            fonts-liberation
      # Cache Puppeteer's Chromium download between runs.
      # Keyed on the puppeteer package version so a version bump busts the cache.
      - name: Cache Puppeteer Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-node${{ matrix.node-version }}
          restore-keys: |
            puppeteer-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            puppeteer-chromium-${{ runner.os }}-
      - run: npm ci
      - run: npm test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Chromium system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 \
            libasound2t64 libpango-1.0-0 libcairo2 \
            fonts-liberation
      - name: Cache Puppeteer Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-node22
          restore-keys: |
            puppeteer-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            puppeteer-chromium-${{ runner.os }}-
      - run: npm ci
      - run: npm run test:coverage
